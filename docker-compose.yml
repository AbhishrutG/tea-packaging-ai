services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///./tea_packaging.db
    volumes:
      - backend_data:/app

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    environment:
      API_URL_INTERNAL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend_data:
